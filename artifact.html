<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact - Project Skirk</title>
    <link rel="icon" href="https://ik.imagekit.io/gukc1okbd/Crystallina_Shape.webp" type="image/webp">
    <link rel="stylesheet" href="styles.css">
    <style>
        .artifact-detail-wrapper {
            min-height: 100vh;
            padding: 24px;
        }

        .artifact-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 32px;
            align-items: start;
        }

        .artifact-hero-left {
            display: grid;
            grid-template-columns: 88px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .artifact-hero-image {
            box-sizing: border-box;
            background: linear-gradient(135deg, rgba(124, 92, 255, 0.2) 0%, rgba(124, 92, 255, 0.1) 100%);
            border: 2px solid rgba(124, 92, 255, 0.4);
            border-radius: 12px;
            padding: 12px;
            width: 88px;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .artifact-hero-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(124, 92, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .artifact-hero-image img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            position: relative;
            z-index: 1;
        }

        .artifact-hero-text {
            padding-top: 0;
            min-width: 0;
        }

        .artifact-title {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .artifact-title-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            background: rgba(124, 92, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #9370db;
        }

        .artifact-title-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            word-break: break-word;
        }

        .artifact-rarity {
            display: flex;
            gap: 6px;
            font-size: 20px;
            margin-top: 8px;
        }

        .artifact-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
        }

        .info-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: #9370db;
            line-height: 1.4;
        }

        .artifact-hero-right {
            padding: 20px;
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 12px;
            background: rgba(124, 92, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .bonus-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bonus-section h3 {
            font-size: 14px;
            color: #9370db;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .bonus-text {
            font-size: 13px;
            line-height: 1.8;
            color: #ddd;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid rgba(124, 92, 255, 0.5);
        }

        .content-tabs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 32px 0;
        }

        .tab-btn {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(124, 92, 255, 0.3);
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-btn:hover {
            border-color: rgba(124, 92, 255, 0.6);
            color: #ddd;
        }

        .tab-btn.active {
            background: rgba(124, 92, 255, 0.2);
            border-color: rgba(124, 92, 255, 0.8);
            color: #9370db;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .artifact-info-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(124, 92, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .artifact-info-section h4 {
            font-size: 14px;
            color: #9370db;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .artifact-story-text {
            font-size: 13px;
            line-height: 1.8;
            color: #ddd;
        }

        @media (max-width: 1024px) {
            .artifact-hero {
                grid-template-columns: 1fr;
            }

            .artifact-hero-image {
                min-height: 88px;
            }
        }

        @media (max-width: 768px) {
            .artifact-detail-wrapper {
                padding: 16px;
            }

            .artifact-hero-left {
                grid-template-columns: 72px minmax(0, 1fr);
                gap: 10px;
            }

            .artifact-hero-image {
                width: 72px;
                height: 72px;
                padding: 10px;
            }

            .artifact-title-name {
                font-size: 18px;
            }

            .artifact-rarity {
                font-size: 16px;
                margin-top: 4px;
            }

            .artifact-title-badge {
                font-size: 11px;
                padding: 5px 10px;
                gap: 5px;
            }

            .content-tabs {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="main-content">
    <nav>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="logo">PROJECT SK<span class="logo-accent">I</span>R<span class="logo-accent">K</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="characters.html">Characters</a>
            <a href="weapons.html">Weapons</a>
            <a href="artifacts.html">Artifacts</a>
            <button class="nav-search-btn" id="searchBtn" title="Search">
                <img src="https://ik.imagekit.io/gukc1okbd/search.webp" alt="Search" class="search-icon">
            </button>
            <button class="nav-settings-btn" id="topSettingsBtn" title="Settings">
                <img src="https://ik.imagekit.io/gukc1okbd/settings.webp" alt="Settings" class="settings-icon">
            </button>
        </div>
    </nav>

    <div class="artifact-detail-wrapper" id="artifactDetails">
        <!-- Artifact details will be loaded here -->
    </div>

    <div class="footer">
        <div class="footer-content">
            <h2>PROJECT SK<span class="logo-accent">I</span>R<span class="logo-accent">K</span></h2>
            <p class="footer-credit">Created by <strong>Raj Roy</strong></p>
  <div class="footer-tech-stack" aria-label="Built with Svelte, Vite, and Tailwind CSS">
    <img class="footer-tech-logo svelte-logo" src="https://cdn.simpleicons.org/svelte/FF3E00" alt="Svelte logo">
    <img class="footer-tech-logo vite-logo" src="https://cdn.simpleicons.org/vite/646CFF" alt="Vite logo">
    <img class="footer-tech-logo tailwind-logo" src="https://cdn.simpleicons.org/tailwindcss/06B6D4" alt="Tailwind CSS logo">
  </div>

  <p class="footer-copyright">&copy; 2026 Project Skirk</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    function formatReadableText(text) {
        if (!text) return 'Story unavailable.';
        return String(text)
            .replace(/<color=#[0-9A-Fa-f]+>/g, '')
            .replace(/<\/color>/g, '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\r\n|\n|\r/g, '<br>');
    }

    async function fetchArtifactPieceStory(artifactId, pieceIndex) {
        try {
            const key = `Relic${artifactId}_${pieceIndex}`;
            const res = await fetch(`https://gi.yatta.moe/api/v2/EN/readable/${key}?vh=64F0`);
            if (!res.ok) return '';
            const json = await res.json();
            return String(json?.data || '').trim();
        } catch (e) {
            return '';
        }
    }

    async function fetchAllPieceStories(artifactId) {
        const pieces = [1, 2, 3, 4, 5];
        const responses = await Promise.all(
            pieces.map(async (idx) => [idx, await fetchArtifactPieceStory(artifactId, idx)])
        );
        return Object.fromEntries(responses);
    }

    async function fetchArtifactSuit(artifactId) {
        try {
            const res = await fetch(`https://gi.yatta.moe/api/v2/EN/reliquary/${artifactId}?vh=64F0`);
            if (!res.ok) return null;
            const json = await res.json();
            return json?.data?.suit || null;
        } catch (e) {
            return null;
        }
    }

    async function loadArtifactDetail() {
        const params = new URLSearchParams(window.location.search);
        const artifactId = params.get('id');
        const container = document.getElementById('artifactDetails');

        if (!artifactId) {
            container.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">Artifact ID not found</p>';
            return;
        }

        try {
            const response = await fetch('artifacts.json');
            const artifacts = await response.json();
            const artifact = artifacts.find(a => String(a.id) === String(artifactId));

            if (!artifact) {
                container.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">Artifact not found</p>';
                return;
            }

            const [pieceStories, suitData] = await Promise.all([
                fetchAllPieceStories(artifact.id),
                fetchArtifactSuit(artifact.id)
            ]);
            const defaultStoryHtml = formatReadableText(pieceStories[1] || 'Story unavailable.');
            const iconUrl = `https://gi.yatta.moe/assets/UI/reliquary/${artifact.icon}.png?vh=2024123000`;
            const rarityStars = '?'.repeat(artifact.rarity || 3);

            const pieceOrder = [
                ['EQUIP_BRACER', 'Flower of Life', 1],
                ['EQUIP_NECKLACE', 'Plume of Death', 2],
                ['EQUIP_SHOES', 'Sands of Eon', 3],
                ['EQUIP_RING', 'Goblet of Eonothem', 4],
                ['EQUIP_DRESS', 'Circlet of Logos', 5]
            ];

            const pieceEntries = pieceOrder.map(([slot, fallbackName, storyIndex]) => {
                const piece = suitData && suitData[slot] ? suitData[slot] : null;
                const pName = piece?.name || fallbackName;
                const pDesc = formatReadableText(piece?.description || 'No story available.');
                const pStory = formatReadableText(pieceStories[storyIndex] || 'Story unavailable.');
                const pIcon = piece?.icon ? `https://gi.yatta.moe/assets/UI/reliquary/${piece.icon}.png?vh=64F0` : '';
                return { pName, pDesc, pStory, pIcon, storyIndex };
            });

            const pieceCards = pieceEntries.map((entry, idx) => {
                const { pName, pDesc, pIcon } = entry;
                return `
                    <button class="artifact-info-section piece-story-card" data-piece-index="${idx}" style="margin-bottom:14px; width:100%; text-align:left; cursor:pointer; background:rgba(0,0,0,0.2);">
                        <h4 style="display:flex;align-items:center;gap:8px;">
                            ${pIcon ? `<img src="${pIcon}" alt="${pName}" style="width:22px;height:22px;object-fit:contain;">` : ''}
                            ${pName}
                        </h4>
                        <div class="artifact-story-text">${pDesc}</div>
                    </button>
                `;
            }).join('');

            container.innerHTML = `
                <div class="artifact-hero">
                    <div class="artifact-hero-left">
                        <div class="artifact-hero-image">
                            <img src="${iconUrl}" alt="${artifact.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
                        </div>
                        <div class="artifact-hero-text">
                            <div class="artifact-title">
                                <div class="artifact-title-badge">? Artifact Set</div>
                                <div class="artifact-title-name">${artifact.name}</div>
                                <div class="artifact-rarity">${rarityStars}</div>
                            </div>
                        </div>
                    </div>

                    <div class="artifact-hero-right">
                        <div class="bonus-section">
                            <h3>2-Piece Bonus</h3>
                            <div class="bonus-text">${artifact.setBonus2pc || 'N/A'}</div>
                        </div>
                        <div class="bonus-section">
                            <h3>4-Piece Bonus</h3>
                            <div class="bonus-text">${artifact.setBonus4pc || 'N/A'}</div>
                        </div>
                    </div>
                </div>

                <div id="stats" class="content-section active">
                    <div class="artifact-info-section">
                        <h4 id="artifactMainStoryTitle">Story</h4>
                        <div class="artifact-story-text" id="artifactMainStoryBody">${defaultStoryHtml}</div>
                    </div>
                    <div class="artifact-info-section">
                        <h4>Piece Stories</h4>
                        ${pieceCards}
                    </div>
                </div>

                <div class="content-tabs">
                    <button class="tab-btn active" onclick="switchTab(event, 'stats')">Stats</button>
                </div>
            `;

            const mainStoryTitle = container.querySelector('#artifactMainStoryTitle');
            const mainStoryBody = container.querySelector('#artifactMainStoryBody');
            container.querySelectorAll('.piece-story-card').forEach(card => {
                card.addEventListener('click', () => {
                    const idx = Number(card.dataset.pieceIndex);
                    const piece = pieceEntries[idx];
                    if (!piece) return;
                    if (mainStoryTitle) mainStoryTitle.textContent = `Story - ${piece.pName}`;
                    if (mainStoryBody) mainStoryBody.innerHTML = piece.pStory;
                    container.querySelectorAll('.piece-story-card').forEach(c => c.style.borderColor = 'rgba(124, 92, 255, 0.2)');
                    card.style.borderColor = 'rgba(124, 92, 255, 0.8)';
                });
            });
        } catch (error) {
            console.error('Error loading artifact:', error);
            container.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">Failed to load artifact details</p>';
        }
    }

    function switchTab(event, tabName) {
        event.preventDefault();

        document.querySelectorAll('.content-section').forEach(section => {
            section.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', loadArtifactDetail);
</script>
<script>
// Scroll to Top Button
const scrollToTopBtn = document.createElement('button');
scrollToTopBtn.id = 'scrollToTopBtn';
scrollToTopBtn.title = 'Scroll to top';
scrollToTopBtn.innerHTML = '&uarr;';
document.body.appendChild(scrollToTopBtn);

window.addEventListener('scroll', () => {
  const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
  const scrolledPercentage = (window.pageYOffset / scrollHeight) * 100;
  if (scrolledPercentage > 50) {
    scrollToTopBtn.classList.add('visible');
  } else {
    scrollToTopBtn.classList.remove('visible');
  }
});

scrollToTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
