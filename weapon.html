<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapon - Project Skirk</title>
    <link rel="icon" href="https://ik.imagekit.io/gukc1okbd/Crystallina_Shape.webp" type="image/webp">
    <link rel="stylesheet" href="styles.css">
    <style>
        .weapon-detail-wrapper {
            min-height: 100vh;
            padding: 24px;
        }

        .weapon-hero {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            margin-bottom: 32px;
            align-items: start;
        }

        .weapon-hero-left {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: flex-start;
        }

        .weapon-hero-image {
            background: linear-gradient(135deg, rgba(139, 90, 43, 0.3) 0%, rgba(255, 200, 50, 0.1) 100%);
            border: 2px solid rgba(255, 200, 50, 0.3);
            border-radius: 12px;
            padding: 12px;
            width: 210px;
            height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
            flex: 0 0 auto;
        }

        .weapon-hero-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 200, 50, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .weapon-hero-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
        }

        .weapon-hero-text {
            padding-top: 2px;
            min-width: 0;
            flex: 1 1 auto;
        }

        .weapon-title {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .weapon-title-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            background: rgba(139, 90, 43, 0.6);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #d4a574;
        }

        .weapon-title-name {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .weapon-rarity {
            display: flex;
            gap: 6px;
            font-size: 24px;
            margin-top: 8px;
        }

        .weapon-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
        }

        .info-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: #00f0ff;
        }

        .weapon-hero-right {
            padding: 20px;
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 12px;
            background: rgba(124, 92, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .weapon-controls-inline {
            margin: 10px 0 18px 0;
            padding: 14px;
            border: 1px solid rgba(124, 92, 255, 0.28);
            border-radius: 12px;
            background: rgba(124, 92, 255, 0.05);
        }

        .weapon-controls-inline .control-label {
            color: #b8a8ff;
        }

        .story-section h3 {
            font-size: 14px;
            color: #9370db;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .story-text {
            font-size: 13px;
            line-height: 1.8;
            color: #ddd;
        }

        .weapon-controls-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: 600;
        }

        .level-slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, rgba(124, 92, 255, 0.3), rgba(124, 92, 255, 0.6));
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(124, 92, 255, 0.8);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: rgba(124, 92, 255, 1);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(124, 92, 255, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(124, 92, 255, 0.8);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .level-value {
            font-size: 12px;
            min-width: 30px;
            text-align: right;
            color: #00f0ff;
            font-weight: 600;
        }

        .content-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 32px 0;
        }

        .tab-btn {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(124, 92, 255, 0.3);
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-btn:hover {
            border-color: rgba(124, 92, 255, 0.6);
            color: #ddd;
        }

        .tab-btn.active {
            background: rgba(124, 92, 255, 0.2);
            border-color: rgba(124, 92, 255, 0.8);
            color: #9370db;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .weapon-info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .basic-info {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .info-group {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid rgba(124, 92, 255, 0.5);
            padding: 20px;
            border-radius: 8px;
        }

        .info-group h4 {
            font-size: 14px;
            color: #9370db;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-name {
            font-size: 13px;
            color: #aaa;
        }

        .stat-val {
            font-size: 16px;
            font-weight: 600;
            color: #00f0ff;
            text-align: right;
        }

        .passive-ability {
            background: rgba(255, 200, 50, 0.08);
            border-left: 3px solid rgba(255, 200, 50, 0.6);
            padding: 20px;
            border-radius: 8px;
        }

        .passive-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffc832;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refinement-ranks {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .rank-btn {
            padding: 6px 12px;
            background: rgba(255, 200, 50, 0.1);
            border: 2px solid rgba(255, 200, 50, 0.3);
            border-radius: 6px;
            color: #ddd;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .rank-btn:hover {
            border-color: rgba(255, 200, 50, 0.6);
            background: rgba(255, 200, 50, 0.15);
        }

        .rank-btn.active {
            background: rgba(255, 200, 50, 0.25);
            border-color: rgba(255, 200, 50, 0.8);
            color: #ffc832;
        }

        .passive-description {
            font-size: 13px;
            line-height: 1.7;
            color: #ddd;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .ascension-materials {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
        }

        .material-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            text-align: center;
        }

        .material-icon {
            width: 60px;
            height: 60px;
            background: rgba(124, 92, 255, 0.1);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 6px;
            object-fit: contain;
            padding: 4px;
            display: block;
            box-sizing: border-box;
        }

        .material-quantity {
            font-size: 12px;
            color: #00f0ff;
            font-weight: 600;
        }

        .material-name {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            line-height: 1.3;
        }

        /* Material hover tooltip (same behavior as Characters page) */
        .material-hover-tooltip {
            position: fixed;
            z-index: 9999;
            display: none;
            pointer-events: none;
            width: min(220px, calc(100vw - 24px));
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(124, 92, 255, 0.45);
            background: linear-gradient(135deg, rgba(16, 16, 30, 0.96), rgba(26, 20, 40, 0.96));
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }
        .material-hover-tooltip .tooltip-name {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .material-hover-tooltip .tooltip-desc {
            font-size: 10px;
            color: #ddd;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-word;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(124, 92, 255, 0.15);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 6px;
            color: #9370db;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background: rgba(124, 92, 255, 0.25);
            border-color: rgba(124, 92, 255, 0.5);
            color: #b8a4e8;
        }

        @media (max-width: 900px) {
            .weapon-hero {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .weapon-hero-left {
                flex-direction: row;
                align-items: center;
                text-align: left;
                gap: 14px;
            }

            .weapon-title-badge {
                margin: 0;
                font-size: 12px;
                padding: 6px 12px;
            }

            .weapon-info-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .weapon-info-section {
                grid-template-columns: 1fr;
            }

            .content-tabs {
                grid-template-columns: 1fr;
            }

            .weapon-hero-image {
                width: 150px;
                height: 150px;
                padding: 8px;
            }

            .weapon-title-name {
                font-size: 20px;
                line-height: 1.15;
            }

            .weapon-rarity {
                font-size: 18px;
                margin-top: 4px;
            }

            .info-card {
                padding: 12px;
            }

            .info-value {
                font-size: 18px;
            }
        }
    </style>
</head>

<script>
    const params = new URLSearchParams(window.location.search);
    const weaponId = params.get('id');

    function sanitizeFileName(name) {
        return name
            .replace(/\//g, '_')
            .replace(/\\/g, '_')
            .replace(/:/g, '_')
            .replace(/\*/g, '_')
            .replace(/\?/g, '_')
            .replace(/"/g, '_')
            .replace(/</g, '_')
            .replace(/>/g, '_')
            .replace(/\|/g, '_')
            .replace(/'/g, '')
            .replace(/"/g, '');
    }

    function mapWeaponType(rawType) {
        const type = String(rawType || '').toUpperCase();
        if (type.includes('SWORD')) return 'Sword';
        if (type.includes('CLAYMORE')) return 'Claymore';
        if (type.includes('POLE')) return 'Polearm';
        if (type.includes('CATALYST')) return 'Catalyst';
        if (type.includes('BOW')) return 'Bow';
        return rawType || 'Unknown';
    }

    function weaponTypeIcon(type) {
        const t = String(type || '').toLowerCase();
        if (t === 'sword') return 'https://ik.imagekit.io/gukc1okbd/UI_GachaTypeIcon_Sword.png';
        if (t === 'claymore') return 'https://ik.imagekit.io/gukc1okbd/UI_GachaTypeIcon_Claymore.png';
        if (t === 'polearm') return 'https://ik.imagekit.io/gukc1okbd/UI_GachaTypeIcon_Pole.png';
        if (t === 'catalyst') return 'https://ik.imagekit.io/gukc1okbd/UI_GachaTypeIcon_Catalyst.png';
        if (t === 'bow') return 'https://ik.imagekit.io/gukc1okbd/UI_GachaTypeIcon_Bow.png';
        return '';
    }

    function mapQualityToRarity(qualityType, fallback = 3) {
        const q = String(qualityType || '').toUpperCase();
        if (q.includes('ORANGE') || q.includes('GOLD')) return 5;
        if (q.includes('PURPLE')) return 4;
        if (q.includes('BLUE')) return 3;
        if (q.includes('GREEN')) return 2;
        if (q.includes('WHITE')) return 1;
        return fallback;
    }

    function extractSecondaryStat(ascensionStats) {
        if (!ascensionStats || typeof ascensionStats !== 'object') {
            return { secondaryLabel: '—', secondaryStat: '—' };
        }
        const secondaryEntry = Object.entries(ascensionStats).find(([k, v]) => {
            const key = String(k || '').toLowerCase();
            const num = Number(v);
            return key !== 'atk' && key !== 'baseatk' && Number.isFinite(num) && num > 0;
        });

        if (!secondaryEntry) return { secondaryLabel: '—', secondaryStat: '—' };

        const [rawLabel, rawValue] = secondaryEntry;
        const cleanLabel = String(rawLabel).replace(/%/g, '');
        const valueNum = Number(rawValue);
        return {
            secondaryLabel: cleanLabel || 'Substat',
            secondaryStat: Number.isFinite(valueNum) ? `${valueNum}%` : String(rawValue)
        };
    }

    function normalizeLunarisWeapon(apiWeapon, fallbackWeapon) {
        const statsMap = apiWeapon?.stats || {};
        const stats90 = statsMap['90'] || statsMap[90] || {};
        const secondaryEntry = Object.entries(stats90).find(([k]) => String(k).toLowerCase() !== 'atk');
        const secondary = secondaryEntry
            ? { secondaryLabel: String(secondaryEntry[0]).replace(/%/g, ''), secondaryStat: `${secondaryEntry[1]}%` }
            : extractSecondaryStat(apiWeapon?.ascensionStats || {});
        const baseAtk = Number(
            stats90?.atk ??
            apiWeapon?.ascensionStats?.atk ??
            apiWeapon?.atk ??
            apiWeapon?.baseAtk ??
            fallbackWeapon?.atk ??
            0
        );

        const rarity = mapQualityToRarity(apiWeapon?.qualityType, Number(fallbackWeapon?.rarity || 3));
        const name = apiWeapon?.enName || apiWeapon?.name || fallbackWeapon?.name || `Weapon ${weaponId}`;

        return {
            id: String(weaponId),
            name,
            type: mapWeaponType(apiWeapon?.weaponType || fallbackWeapon?.type),
            rarity,
            icon: apiWeapon?.weaponIcon || fallbackWeapon?.icon || '',
            atk: Number.isFinite(baseAtk) ? Math.round(baseAtk) : (fallbackWeapon?.atk || 0),
            secondaryLabel: secondary.secondaryLabel,
            secondaryStat: secondary.secondaryStat,
            description: apiWeapon?.description || apiWeapon?.story || apiWeapon?.desc || fallbackWeapon?.description || 'No story available.'
        };
    }

    function normalizeDetailData(apiWeapon) {
        const passive = apiWeapon?.passive
            ? [{ name: apiWeapon.passive.name, upgrade: apiWeapon.passive.refinements || {} }]
            : null;
        const affix =
            passive ||
            apiWeapon?.affix ||
            apiWeapon?.weaponAffix ||
            apiWeapon?.skill ||
            null;

        const ascension =
            apiWeapon?.ascension ||
            apiWeapon?.ascensionMaterials ||
            apiWeapon?.materials ||
            null;

        const items = apiWeapon?.items || apiWeapon?.materialItems || {};
        const levelStats = apiWeapon?.stats || {};

        return { affix, ascension, items, levelStats };
    }

    let materialLookupCache = null;
    async function loadMaterialLookup() {
        if (materialLookupCache) return materialLookupCache;
        try {
            const res = await fetch('https://api.lunaris.moe/data/6.4.51/materiallist.json');
            if (!res.ok) {
                materialLookupCache = {};
                return materialLookupCache;
            }
            const json = await res.json();
            materialLookupCache = json || {};
            return materialLookupCache;
        } catch (e) {
            materialLookupCache = {};
            return materialLookupCache;
        }
    }

    async function loadWeapon() {
        const contentDiv = document.getElementById('weaponContent');
        
        if (!weaponId) {
            contentDiv.innerHTML = '<p style="text-align: center; color: #f00;">Weapon ID not found.</p>';
            return;
        }

        try {
            const [weaponsRes, lunarisRes, yattaStoryRes] = await Promise.all([
                fetch('weapons.json').catch(() => null),
                fetch(`https://api.lunaris.moe/data/6.4.51/en/weapon/${weaponId}.json`).catch(() => null),
                fetch(`https://gi.yatta.moe/api/v2/EN/readable/Weapon${weaponId}?vh=64F0`).catch(() => null)
            ]);

            let fallbackWeapon = null;
            if (weaponsRes && weaponsRes.ok) {
                const weapons = await weaponsRes.json();
                fallbackWeapon = (weapons || []).find(w => String(w.id) === String(weaponId)) || null;
            }

            let yattaStory = '';
            if (yattaStoryRes && yattaStoryRes.ok) {
                try {
                    const yattaJson = await yattaStoryRes.json();
                    yattaStory = String(yattaJson?.data || '').trim();
                } catch (e) {
                    yattaStory = '';
                }
            }

            if (!lunarisRes || !lunarisRes.ok) {
                if (!fallbackWeapon) {
                    contentDiv.innerHTML = '<p style="text-align: center; color: #f00;">Weapon not found.</p>';
                    return;
                }
                if (yattaStory) {
                    fallbackWeapon.description = yattaStory;
                }
                renderWeapon(fallbackWeapon, null);
                return;
            }

            const apiWeapon = await lunarisRes.json();
            const weapon = normalizeLunarisWeapon(apiWeapon, fallbackWeapon);
            if (yattaStory) {
                weapon.description = yattaStory;
            }
            const fullWeapon = normalizeDetailData(apiWeapon);
            fullWeapon.materialLookup = await loadMaterialLookup();

            renderWeapon(weapon, fullWeapon);
        } catch (error) {
            console.error('Error loading weapon:', error);
            contentDiv.innerHTML = '<p style="text-align: center; color: #f00;">Error loading weapon data.</p>';
        }
    }

    function wikiToHtml(text) {
        if (!text) return '';
        const cleaned = String(text)
            .replace(/<color=#[0-9A-F]+>/g, '')
            .replace(/<\/color>/g, '')
            .replace(/\|/g, ' | ');
        return cleaned
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\r\n|\n|\r/g, '<br>');
    }

    function normalizeTooltipText(text) {
        if (!text) return '';
        return String(text)
            .replace(/<color=#[0-9A-F]+>/g, '')
            .replace(/<\/color>/g, '')
            .replace(/\r\n|\n|\r/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function decodeTooltipData(value, fallback = '') {
        if (!value) return fallback;
        try {
            return decodeURIComponent(value);
        } catch (e) {
            return value;
        }
    }

    function getMaterialTooltipElement() {
        let tooltip = document.getElementById('materialHoverTooltip');
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.id = 'materialHoverTooltip';
            tooltip.className = 'material-hover-tooltip';
            tooltip.innerHTML = '<div class="tooltip-name"></div><div class="tooltip-desc"></div>';
            document.body.appendChild(tooltip);
        }
        return tooltip;
    }

    function positionMaterialTooltip(tooltip, event) {
        const gap = 14;
        let x = event.clientX + gap;
        let y = event.clientY + gap;
        const rect = tooltip.getBoundingClientRect();
        if (x + rect.width > window.innerWidth - 10) x = event.clientX - rect.width - gap;
        if (y + rect.height > window.innerHeight - 10) y = event.clientY - rect.height - gap;
        tooltip.style.left = `${Math.max(8, x)}px`;
        tooltip.style.top = `${Math.max(8, y)}px`;
    }

    function bindMaterialHoverTooltips(selector) {
        const cards = document.querySelectorAll(selector);
        if (!cards.length) return;
        const tooltip = getMaterialTooltipElement();

        cards.forEach((card) => {
            if (card.dataset.tooltipBound === '1') return;
            card.dataset.tooltipBound = '1';

            card.addEventListener('mouseenter', (event) => {
                const name = decodeTooltipData(card.dataset.itemName, 'Unknown Item');
                const description = decodeTooltipData(card.dataset.itemDescription, 'No description available.');
                const rarityColor = card.dataset.rarityColor || '#ddd';
                tooltip.querySelector('.tooltip-name').textContent = name;
                tooltip.querySelector('.tooltip-name').style.color = rarityColor;
                tooltip.querySelector('.tooltip-desc').textContent = description;
                tooltip.style.display = 'block';
                positionMaterialTooltip(tooltip, event);
            });

            card.addEventListener('mousemove', (event) => {
                if (tooltip.style.display === 'block') {
                    positionMaterialTooltip(tooltip, event);
                }
            });

            card.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    }

    function renderWeapon(weapon, fullWeapon) {
        const contentDiv = document.getElementById('weaponContent');
        const iconUrl = `https://gi.yatta.moe/assets/UI/${weapon.icon}.png`;
        const stars = '★'.repeat(weapon.rarity || 0);
        const typeIcon = weaponTypeIcon(weapon.type);
        const levelStatsMap = fullWeapon?.levelStats || {};

        let passiveHtml = '';
        if (fullWeapon && fullWeapon.affix) {
            const affixList = Array.isArray(fullWeapon.affix)
                ? fullWeapon.affix
                : (typeof fullWeapon.affix === 'object' ? Object.values(fullWeapon.affix) : []);
            const affix = affixList.find(a => a && (a.name || a.title || a.upgrade || a.description));

            if (affix) {
                const upgrades = affix.upgrade || affix.upgrades || {};
                let rankButtons = '';
                for (let i = 0; i < 5; i++) {
                    rankButtons += `<button class="rank-btn ${i === 0 ? 'active' : ''}" onclick="changeRank(${i}, this)">${i + 1}</button>`;
                }

                const desc0 = wikiToHtml(upgrades['1'] || upgrades[1] || upgrades['0'] || upgrades[0] || affix.description || '');
                passiveHtml = `
                    <div class="passive-ability">
                        <div class="passive-name">${affix.name || affix.title || 'Passive'}</div>
                        <div id="refinementLabel" style="font-size:12px;color:#aaa;margin-bottom:8px;">R1</div>
                        <div class="refinement-ranks">${rankButtons}</div>
                        <div class="passive-description" id="passiveDesc">${desc0}</div>
                    </div>
                `;

                window.currentAffix = { ...affix, upgrade: upgrades };
            }
        }

        const materialLookup = fullWeapon?.materialLookup || {};
        const materialEntries = Object.values(materialLookup);
        const findMaterialMeta = (icon, id) => {
            const idStr = String(id || '');
            return materialEntries.find(m =>
                m && (
                    (icon && (m.icon === icon || m.sideIcon === icon || m.itemIcon === icon)) ||
                    (idStr && (String(m.id || '') === idStr || String(m.route || '') === idStr))
                )
            ) || null;
        };
        const formatCount = (n) => {
            const num = Number(n);
            if (!Number.isFinite(num)) return n;
            if (num >= 1000) return `${Math.round(num / 1000)}K`;
            return `${num}`;
        };

        let ascensionHtml = '';
        if (fullWeapon && fullWeapon.ascension) {
            const ascMaterials = fullWeapon.ascension;
            let materialsContent = '';
            const encodeForData = (value) => encodeURIComponent(String(value || ''));

            const materialRows = Array.isArray(ascMaterials)
                ? ascMaterials
                : Object.entries(ascMaterials).map(([id, qty]) => ({ id, qty }));

            for (const row of materialRows) {
                const ascIcon = String(row.icon || row.iconName || '');
                const idFromIcon = (ascIcon.match(/(\d+)/) || [])[1] || '';
                const id = String(row.id ?? row.itemId ?? row.materialId ?? idFromIcon ?? '');
                const qty = row.qty ?? row.count ?? row.num ?? 0;
                if (!id && !ascIcon) continue;

                const item = fullWeapon.items && fullWeapon.items[id] ? fullWeapon.items[id] : null;
                const meta = findMaterialMeta(ascIcon, id);
                const itemName =
                    (item && (item.name || item.enName)) ||
                    (meta && (meta.name || meta.enName)) ||
                    `Item ${id || ascIcon}`;
                const rawDesc =
                    (item && (item.description || item.desc)) ||
                    (meta && (meta.description || meta.desc)) ||
                    'No description available.';
                const tooltipDesc = normalizeTooltipText(rawDesc) || 'No description available.';
                const itemIcon = ascIcon || (item && (item.icon || item.iconName)) || (meta && (meta.icon || meta.sideIcon)) || `ItemIcon_${id}`;
                const matIconUrl = `https://gi.yatta.moe/assets/UI/${itemIcon}.png`;

                materialsContent += `
                    <div class="material-item material-card"
                         data-item-name="${encodeForData(itemName)}"
                         data-item-description="${encodeForData(tooltipDesc)}"
                         data-rarity-color="#00f0ff">
                        <img src="${matIconUrl}" alt="${itemName}" class="material-icon" onerror="this.style.display='none'">
                        <div class="material-quantity">${formatCount(qty)}</div>
                        <div class="material-name">${itemName}</div>
                    </div>
                `;
            }

            ascensionHtml = `
                <div class="info-group">
                    <h4>Ascension Materials</h4>
                    <div class="materials-grid">${materialsContent}</div>
                </div>
            `;
        }

        const storyText = wikiToHtml(weapon.description || 'No story available.');

        const html = `
            <div class="weapon-hero">
                <div class="weapon-hero-left">
                    <div class="weapon-hero-image">
                        <img src="${iconUrl}" alt="${weapon.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
                    </div>
                    <div class="weapon-hero-text">
                        <div class="weapon-title">
                            <span class="weapon-title-badge">
                                ${typeIcon ? `<img src="${typeIcon}" alt="" style="width:16px;height:16px;object-fit:contain;" onerror="this.style.display='none'">` : '&#9876;&#65039;'}
                                ${weapon.type}
                            </span>
                            <div class="weapon-title-name">${weapon.name}</div>
                            <div class="weapon-rarity">${stars}</div>
                        </div>
                        <div class="weapon-info-grid">
                            <div class="info-card">
                                <div class="info-label">Base ATK</div>
                                <div class="info-value" id="heroAtkValue">${weapon.atk}</div>
                            </div>
                            ${weapon.secondaryStat && weapon.secondaryStat !== '—' ? `
                            <div class="info-card" id="heroSubCard">
                                <div class="info-label" id="heroSubLabel">${weapon.secondaryLabel}</div>
                                <div class="info-value" id="heroSubValue">${weapon.secondaryStat}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            </div>

            <div class="content-tabs">
                <button class="tab-btn active" onclick="switchTab('weapon-info')">Weapon Information</button>
                <button class="tab-btn" onclick="switchTab('assets')">Assets</button>
                <button class="tab-btn" onclick="switchTab('diffs')">Diffs</button>
            </div>

            <div class="content-section active" id="weapon-info">
                <div class="weapon-info-section">
                    <div class="weapon-controls-inline">
                        <div class="weapon-controls-section" style="margin-top:0">
                            <div class="control-item">
                                <div class="control-label">Level</div>
                                <div class="level-slider-container">
                                    <input type="range" id="levelSlider" min="1" max="90" value="90" style="flex: 1;">
                                    <div class="level-value" id="levelValue">Lv. 90</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="basic-info">
                        <div class="info-group">
                            <h4>Basic Information</h4>
                            <div class="stat-row">
                                <div class="stat-name">Base ATK</div>
                                <div class="stat-val" id="basicAtkValue">${weapon.atk}</div>
                            </div>
                            ${weapon.secondaryStat && weapon.secondaryStat !== '—' ? `
                            <div class="stat-row" id="basicSubRow">
                                <div class="stat-name" id="basicSubLabel">${weapon.secondaryLabel}</div>
                                <div class="stat-val" id="basicSubValue">${weapon.secondaryStat}</div>
                            </div>
                            ` : ''}
                            <div class="stat-row">
                                <div class="stat-name">Weapon Type</div>
                                <div class="stat-val">${weapon.type}</div>
                            </div>
                            <div class="stat-row">
                                <div class="stat-name">Rarity</div>
                                <div class="stat-val">${weapon.rarity}★</div>
                            </div>
                        </div>
                        ${passiveHtml}
                    </div>
                    <div class="ascension-materials">
                        ${ascensionHtml}
                        <div class="info-group">
                            <h4>Story</h4>
                            <div class="story-text">${storyText}</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="content-section" id="assets" style="text-align: center; padding: 40px; color: #aaa;">
                <p>Asset information unavailable</p>
            </div>

            <div class="content-section" id="diffs" style="text-align: center; padding: 40px; color: #aaa;">
                <p>Version differences unavailable</p>
            </div>
        `;

        contentDiv.innerHTML = html;
        // Enable material hover tooltips (same UX as character page).
        bindMaterialHoverTooltips('#weaponContent .material-card');

        function getStatsForLevel(level) {
            const direct = levelStatsMap[String(level)] || levelStatsMap[level];
            if (direct) return direct;
            const keys = Object.keys(levelStatsMap)
                .map(k => Number(k))
                .filter(n => Number.isFinite(n))
                .sort((a, b) => a - b);
            if (!keys.length) return null;
            const fallbackLevel = keys.filter(k => k <= level).pop() || keys[0];
            return levelStatsMap[String(fallbackLevel)] || levelStatsMap[fallbackLevel] || null;
        }

        function updateStatsAtLevel(level) {
            const stats = getStatsForLevel(level);
            if (!stats) return;

            const atk = stats.atk ?? weapon.atk;
            const secondaryEntry = Object.entries(stats).find(([k]) => String(k).toLowerCase() !== 'atk');
            const secLabel = secondaryEntry ? String(secondaryEntry[0]).replace(/%/g, '') : '—';
            const secVal = secondaryEntry
                ? `${secondaryEntry[1]}${String(secondaryEntry[0]).includes('%') ? '%' : ''}`
                : '—';

            const heroAtk = document.getElementById('heroAtkValue');
            const basicAtk = document.getElementById('basicAtkValue');
            if (heroAtk) heroAtk.textContent = atk;
            if (basicAtk) basicAtk.textContent = atk;

            const heroSubCard = document.getElementById('heroSubCard');
            const heroSubLabel = document.getElementById('heroSubLabel');
            const heroSubValue = document.getElementById('heroSubValue');
            const basicSubRow = document.getElementById('basicSubRow');
            const basicSubLabel = document.getElementById('basicSubLabel');
            const basicSubValue = document.getElementById('basicSubValue');

            const hasSecondary = secLabel !== '—';
            if (heroSubCard) heroSubCard.style.display = hasSecondary ? '' : 'none';
            if (basicSubRow) basicSubRow.style.display = hasSecondary ? '' : 'none';
            if (heroSubLabel) heroSubLabel.textContent = hasSecondary ? secLabel : '';
            if (heroSubValue) heroSubValue.textContent = hasSecondary ? secVal : '';
            if (basicSubLabel) basicSubLabel.textContent = hasSecondary ? secLabel : '';
            if (basicSubValue) basicSubValue.textContent = hasSecondary ? secVal : '';
        }

        const slider = document.getElementById('levelSlider');
        slider.addEventListener('input', (e) => {
            const level = Number(e.target.value);
            document.getElementById('levelValue').textContent = `Lv. ${level}`;
            updateStatsAtLevel(level);
        });
        updateStatsAtLevel(Number(slider.value || 90));
    }
function switchTab(tabName) {
        document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    function changeRank(rank, btn) {
        document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const refinementLabel = document.getElementById('refinementLabel');
        if (refinementLabel) refinementLabel.textContent = `R${rank + 1}`;
        
        if (window.currentAffix && window.currentAffix.upgrade) {
            const description =
                window.currentAffix.upgrade[String(rank + 1)] ||
                window.currentAffix.upgrade[rank + 1] ||
                window.currentAffix.upgrade[String(rank)] ||
                window.currentAffix.upgrade[rank] ||
                '';
            document.getElementById('passiveDesc').textContent = wikiToHtml(description);
        }
    }

    loadWeapon();
</script>

<script src="script.js"></script>
<script>
// Scroll to Top Button
const scrollToTopBtn = document.createElement('button');
scrollToTopBtn.id = 'scrollToTopBtn';
scrollToTopBtn.title = 'Scroll to top';
scrollToTopBtn.innerHTML = '&uarr;';
document.body.appendChild(scrollToTopBtn);

window.addEventListener('scroll', () => {
  const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
  const scrolledPercentage = (window.pageYOffset / scrollHeight) * 100;
  if (scrolledPercentage > 50) {
    scrollToTopBtn.classList.add('visible');
  } else {
    scrollToTopBtn.classList.remove('visible');
  }
});

scrollToTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
